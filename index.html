<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>모따 레시피 공유 플랫폼</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>모따 레시피 공유 플랫폼</h1>
    </header>

    <main>
      <section id="recipe-list">
        <h2>레시피 목록</h2>
        <ul id="recipes">
          <!-- 레시피 항목이 여기 들어갑니다 -->
        </ul>
      </section>

      <section id="add-recipe">
        <h2>새 레시피 등록</h2>
        <form id="recipe-form">
          <input type="text" id="title" placeholder="레시피 제목" required />
          <input type="text" id="category" placeholder="카테고리" required />
          <textarea id="ingredients" placeholder="재료" required></textarea>
          <textarea id="instructions" placeholder="조리법" required></textarea>
          <button type="submit">등록</button>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
